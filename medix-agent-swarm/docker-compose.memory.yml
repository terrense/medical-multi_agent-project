# 记忆系统依赖：Redis + PostgreSQL
# 启动：docker compose -f docker-compose.memory.yml up -d

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - medix_redis_data:/data

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: medix
      POSTGRES_PASSWORD: medix
      POSTGRES_DB: medix_memory
    ports:
      - "5432:5432"
    volumes:
      - medix_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medix -d medix_memory"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  medix_redis_data:
  medix_pg_data:
